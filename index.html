<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>X-MS Messenger</title>
    <style>
        body { font-family: Arial, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background: #f0f2f5; margin: 0; }
        .screen { width: 360px; height: 640px; background: white; border: 2px solid #333; border-radius: 20px; padding: 20px; box-sizing: border-box; display: none; flex-direction: column; position: relative; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .active { display: flex; }
        input, button { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; }
        button { background: #007bff; color: white; font-weight: bold; cursor: pointer; border: none; }
        button:hover { background: #0056b3; }
        .avatar { width: 50px; height: 50px; background: #333; color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: bold; position: absolute; bottom: 20px; left: 20px; cursor: pointer; }
        .chat-box { flex: 1; border: 1px solid #ddd; margin-bottom: 10px; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; }
        .msg { padding: 8px 12px; margin: 5px 0; border-radius: 8px; max-width: 80%; }
        .msg.me { background: #dcf8c6; align-self: flex-end; }
        .msg.peer { background: #eceff1; align-self: flex-start; }
        .error { color: red; font-size: 12px; text-align: center; }
    </style>
</head>
<body>

    <div id="screen1" class="screen active">
        <h2>Shaxsni kiritish</h2>
        <input type="text" id="username" placeholder="Ism (raqamsiz)">
        <input type="text" id="userphone" placeholder="Telefon (+998...)">
        <div id="error1" class="error"></div>
        <button onclick="toScreen2()">Next</button>
    </div>

    <div id="screen2" class="screen">
        <h2>Ulanish oynasi</h2>
        <input type="text" id="pincode" placeholder="Ulanish kodi (PIN)">
        <button onclick="connectToPeer()">Kod orqali ulanish</button>
        <hr style="width:100%">
        <button onclick="startServer()" style="background:#28a745;">Server ochish</button>
        <div id="generatedCode" style="word-break: break-all; font-size: 11px; margin-top: 10px; background: #eee; padding: 5px; display:none;"></div>
        
        <div id="myAvatar" class="avatar" onclick="showProfile('me')">A</div>
    </div>

    <div id="screen3" class="screen">
        <div id="chatHeader" style="font-weight:bold; padding-bottom:10px; border-bottom:1px solid #ccc; cursor:pointer;" onclick="showProfile('peer')">Suhbatdosh</div>
        <div class="chat-box" id="chatBox"></div>
        <input type="text" id="msgInput" placeholder="Yozadigan joy...">
        <button onclick="sendMessage()">Yuborish</button>
    </div>

    <div id="screen4" class="screen">
        <h2>Profil Ma'lumotlari</h2>
        <div style="background: #f9f9f9; padding: 20px; border-radius: 10px;">
            <p><strong>Ism:</strong> <span id="profName"></span></p>
            <p><strong>Telefon:</strong> <span id="profPhone"></span></p>
        </div>
        <button onclick="backToChat()" style="margin-top: auto;">Ortga</button>
    </div>

    <script>
        let myInfo = { name: '', phone: '' };
        let peerInfo = { name: 'Suhbatdosh', phone: 'Noma\'lum' };
        
        // Avtomatik +998 formatlash
        document.getElementById('userphone').addEventListener('input', function(e) {
            let val = e.target.value;
            if(!val.startsWith('+998')) {
                e.target.value = '+998' + val.replace(/[^\d]/g, '');
            }
        });

        function changeScreen(from, to) {
            document.getElementById('screen' + from).classList.remove('active');
            document.getElementById('screen' + to).classList.add('active');
        }

        function toScreen2() {
            let name = document.getElementById('username').value.trim();
            let phone = document.getElementById('userphone').value.trim();
            let errorDiv = document.getElementById('error1');

            // Validatsiya
            const nameRegex = /^[A-Za-zʻʼa-oʻgʻshchshShChGʻOʻ ]+$/;
            if (!nameRegex.test(name)) {
                errorDiv.innerText = "Ismga raqam kiritish mumkin emas!";
                return;
            }

            const uzbPhoneRegex = /^\+998(33|50|77|88|90|91|93|94|95|97|98|99)\d{7}$/;
            if (!uzbPhoneRegex.test(phone)) {
                errorDiv.innerText = "Yolgʻon telefon raqam!";
                return;
            }

            myInfo.name = name;
            myInfo.phone = phone;
            
            // Avatar birinchi harfini o'rnatish
            document.getElementById('myAvatar').innerText = name.charAt(0).toUpperCase();
            
            errorDiv.innerText = "";
            changeScreen(1, 2);
        }

        // WebRTC o'zgaruvchilari (Lokal simulyatsiya uchun soddalashtirilgan)
        function startServer() {
            // Haqiqiy WebRTC ishlaganda shu yerda p2p offer kodi generatsiya bo'ladi.
            // Hozircha sinov uchun mock pin-kod yaratamiz
            let mockPin = btoa(JSON.stringify(myInfo)).substring(0, 8);
            let codeDiv = document.getElementById('generatedCode');
            codeDiv.style.display = "block";
            codeDiv.innerHTML = `<strong>Sizning kodingiz (buni do'stingizga bering):</strong><br>${mockPin}`;
            
            // Simulyatsiya: Ikkinchi odam ulanganda chatga o'tish
            setTimeout(() => {
                peerInfo = { name: "Ali", phone: "+998901234567" }; // Test uchun
                document.getElementById('chatHeader').innerText = peerInfo.name;
                changeScreen(2, 3);
            }, 8000); 
        }

        function connectToPeer() {
            let pin = document.getElementById('pincode').value.trim();
            if(!pin) { alert("PIN kodni kiriting!"); return; }
            
            // Bu yerda o'sha kod orqali handshake qilinadi
            peerInfo = { name: "Vali (Server)", phone: "+998998887766" }; // Test uchun
            document.getElementById('chatHeader').innerText = peerInfo.name;
            changeScreen(2, 3);
        }

        function sendMessage() {
            let input = document.getElementById('msgInput');
            if(!input.value.trim()) return;

            let box = document.getElementById('chatBox');
            box.innerHTML += `<div class="msg me">${input.value}</div>`;
            box.scrollTop = box.scrollHeight;
            
            input.value = "";
        }

        function showProfile(who) {
            if(who === 'me') {
                document.getElementById('profName').innerText = myInfo.name;
                document.getElementById('profPhone').innerText = myInfo.phone;
            } else {
                document.getElementById('profName').innerText = peerInfo.name;
                document.getElementById('profPhone').innerText = peerInfo.phone;
            }
            // Qaysi oynadan kelganiga qarab orqaga qaytishni boshqarish uchun oyna id sini saqlaymiz
            document.getElementById('screen4').dataset.back = document.querySelector('.screen.active').id;
            
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById('screen4').classList.add('active');
        }

        function backToChat() {
            let backTo = document.getElementById('screen4').dataset.back;
            document.getElementById('screen4').classList.remove('active');
            document.getElementById(backTo).classList.add('active');
        }
    </script>
</body>
</html>
