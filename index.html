<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>X-MS Messenger</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="app.js">
</head>
<body>

    <div id="screen-auth" class="screen active">
        <h2>Shaxsni kiritish</h2>
        <input type="text" id="username" placeholder="Ismingiz (raqamsiz)">
        <input type="text" id="userphone" placeholder="Telefon raqam (+998...)">
        <div id="error-auth" class="error"></div>
        <button id="btn-next">Next</button>
    </div>

    <div id="screen-connect" class="screen">
        <h2>Ulanish oynasi</h2>
        <textarea id="pincode-input" placeholder="Suhbatdoshning PIN kodini bu yerga tashlang..."></textarea>
        <button id="btn-connect">Kod orqali ulanish</button>
        <hr>
        <button id="btn-start-server">Server ochish</button>
        
        <div id="generated-code-box" style="display:none;">
            <p>Sizning PIN kodingiz (nusxalab do'stingizga yuboring):</p>
            <textarea id="my-pincode" readonly></textarea>
        </div>
        
        <div id="my-avatar" class="avatar">A</div>
    </div>

    <div id="screen-chat" class="screen">
        <div id="chat-header">Suhbatdosh</div>
        <div id="chat-box"></div>
        <div class="input-area">
            <input type="text" id="msg-input" placeholder="Yozadigan joy...">
            <button id="btn-send">Yuborish</button>
        </div>
    </div>

    <div id="screen-profile" class="screen">
        <h2>Profil Ma'lumotlari</h2>
        <div class="profile-card">
            <p><strong>Ism:</strong> <span id="prof-name"></span></p>
            <p><strong>Telefon:</strong> <span id="prof-phone"></span></p>
        </div>
        <button id="btn-back">Ortga</button>
    </div>

    <script href="app.js"></script>
</body>
</html>
