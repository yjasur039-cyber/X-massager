<!DOCTYPE html>
<html lang="uz">
<head>
    <link rel="stylesheet" href="index.js"
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>x ms | Terminal</title>
    <style>
        * { box-sizing: border-box; }
        body { background: #050505; color: #00ff41; font-family: 'Consolas', monospace; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        .app-border { border: 2px solid #00ff41; width: 380px; height: 600px; position: relative; display: flex; flex-direction: column; box-shadow: 0 0 20px rgba(0, 255, 65, 0.2); }
        .header { border-bottom: 1px solid #00ff41; padding: 10px; text-align: center; font-size: 1.2em; letter-spacing: 3px; background: rgba(0, 255, 65, 0.1); }
        .screen { flex: 1; padding: 15px; overflow-y: auto; }
        input, select, textarea { width: 100%; background: #111; border: 1px solid #00ff41; color: #00ff41; padding: 10px; margin-bottom: 15px; outline: none; }
        button { width: 100%; background: #00ff41; color: #000; border: none; padding: 12px; cursor: pointer; font-weight: bold; text-transform: uppercase; transition: 0.3s; }
        button:hover { background: #008f11; color: #fff; }
        .deliverer-btn { border: 1px dashed #00ff41; padding: 15px; cursor: pointer; text-align: center; margin-top: 20px; animation: blink 2s infinite; }
        @keyframes blink { 0% {opacity: 1;} 50% {opacity: 0.5;} 100% {opacity: 1;} }
        .hidden { display: none; }
        .log { font-size: 0.8em; color: #008f11; margin-top: 10px; }
    </style>
</head>
<body>

<div class="app-border">
    <div class="header">X MS v1.0.2</div>
    
    <!-- AUTH SCREEN -->
    <div id="auth-screen" class="screen">
        <p>> INITIALIZING LOGIN...</p>
        <input type="text" id="username" placeholder="NAME / CODENAME">
        <input type="tel" id="phone" placeholder="PHONE (+998...)">
        <input type="text" id="tg_id" placeholder="TELEGRAM ID">
        <input type="email" id="gmail" placeholder="GMAIL ADDRESS">
        <button onclick="saveAndLogin()">ACCESS GRANTED</button>
    </div>

    <!-- MAIN APP -->
    <div id="main-screen" class="screen hidden">
        <div id="user-info" class="log"></div>
        <div class="deliverer-btn" onclick="openMenu()">[ CLICK TO CALL DELIVERER ]</div>
        
        <div id="menu-area" class="hidden">
            <p style="margin-top:20px;">> SELECT RECIPIENT:</p>
            <select id="role-select" onchange="showChat()">
                <option value="">-- SELECT ROLE --</option>
                <option value="boss">FOR BOSS</option>
                <option value="coder">FOR CODER</option>
                <option value="killer">FOR KILLER</option>
                <option value="spy">FOR SPY</option>
                <option value="mr_n0_0ne">FOR MR_n0_0ne</option>
            </select>
            
            <div id="chat-box" class="hidden">
                <textarea id="msg-text" rows="4" placeholder="ENTER ENCRYPTED MESSAGE..."></textarea>
                <button onclick="executeSend()">EXECUTE SEND</button>
            </div>
        </div>
    </div>
</div>

<script>
    const BOT_TOKEN = "8565651705:AAGcPkBIRk7mGd8OQgNzg-sOcZP2RMyIUfY";
    // Bu yerga o'zingni ID-ngni yozib qo'y, test qilish uchun
    const ADMIN_ID = "O'ZINGNI_ID_RAQAMING"; 

    window.onload = function() {
        const saved = localStorage.getItem('xms_user');
        if(saved) {
            showMain(JSON.parse(saved));
        }
    }

    function saveAndLogin() {
        const data = {
            name: document.getElementById('username').value,
            phone: document.getElementById('phone').value,
            tg: document.getElementById('tg_id').value,
            mail: document.getElementById('gmail').value
        };
        if(!data.name || !data.phone) return alert("REQUIRED FIELDS EMPTY!");
        localStorage.setItem('xms_user', JSON.stringify(data));
        showMain(data);
    }

    function showMain(user) {
        document.getElementById('auth-screen').classList.add('hidden');
        document.getElementById('main-screen').classList.remove('hidden');
        document.getElementById('user-info').innerHTML = `AGENT: ${user.name}<br>STATUS: ENCRYPTED`;
    }

    function openMenu() {
        document.getElementById('menu-area').classList.toggle('hidden');
    }

    function showChat() {
        document.getElementById('chat-box').classList.remove('hidden');
    }

    async function executeSend() {
        const user = JSON.parse(localStorage.getItem('xms_user'));
        const role = document.getElementById('role-select').value;
        const msg = document.getElementById('msg-text').value;

        const report = `📁 X-MS REPORT\n------------------\n👤 FROM: ${user.name}\n📞 TEL: ${user.phone}\n🆔 TG: ${user.tg}\n📧 MAIL: ${user.mail}\n------------------\n🎯 TO: ${role.toUpperCase()}\n💬 MSG: ${msg}`;

        try {
            await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage?chat_id=${ADMIN_ID}&text=${encodeURIComponent(report)}`);
            alert("MESSAGE PURGED AND SENT.");
            document.getElementById('msg-text').value = "";
            document.getElementById('menu-area').classList.add('hidden');
        } catch(e) {
            alert("CONNECTION FAILED.");
        }
    }
</script>
</body>
</html>
